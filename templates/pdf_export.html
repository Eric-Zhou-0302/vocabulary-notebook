<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  @page {
    size: A4;
    margin: 2cm 2.2cm;
    @top-center {
      content: "词汇笔记本 · 导出";
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 10pt;
      color: #888;
    }
    @bottom-center {
      content: "第 " counter(page) " 页";
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 9pt;
      color: #aaa;
    }
  }

  body {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 12pt;
    line-height: 1.8;
    color: #222;
  }

  .date-line {
    text-align: right;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 9pt;
    color: #999;
    margin-bottom: 1.5cm;
  }

  .card {
    break-inside: avoid;
    margin-bottom: 1.2cm;
    padding-bottom: 0.6cm;
    border-bottom: 0.5pt solid #ddd;
  }

  .word {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 16pt;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 2pt;
  }

  .phonetic {
    font-family: "Lucida Grande", "Helvetica Neue", Arial, sans-serif;
    font-size: 11pt;
    color: #666;
    font-weight: 400;
    margin-left: 0.5em;
  }

  .definition {
    font-size: 12pt;
    color: #333;
    margin: 6pt 0 4pt 0;
  }

  .example {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 11pt;
    font-style: italic;
    color: #555;
    margin: 2pt 0 0 0;
  }
</style>
</head>
<body>
  <div class="date-line">导出日期：{{DATE}} · 共 {{COUNT}} 个单词</div>
  {{CARDS}}
</body>
</html>
